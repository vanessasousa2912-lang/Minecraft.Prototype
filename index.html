<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Survival - Luis Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1b1b1b; color: white; user-select: none; }
        canvas { display: block; }

        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.85); pointer-events: all; z-index: 10;
        }
        .hidden { display: none !important; }

        .world-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; width: 300px; }
        .world-item { 
            padding: 15px; background: #333; border: 2px solid #555; cursor: pointer; 
            text-align: center; transition: 0.2s; 
        }
        .world-item:hover { background: #444; border-color: #fff; }

        #game-hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; }
        
        #stats { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .heart { width: 18px; height: 18px; background: red; border: 2px solid #000; border-radius: 3px; }
        .heart.empty { background: #444; }

        #inventory-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 5px; background: rgba(0,0,0,0.7); padding: 5px; border: 2px solid #555; pointer-events: all;
        }
        .slot {
            width: 45px; height: 45px; border: 2px solid #444; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #222; position: relative; font-size: 9px; text-align: center;
        }
        .slot.selected { border-color: #fff; background: #555; }
        .count { position: absolute; bottom: 2px; right: 4px; font-weight: bold; font-size: 11px; color: #fff; text-shadow: 1px 1px #000; }

        #save-indicator {
            position: absolute; top: 20px; right: 20px; padding: 10px; background: rgba(0,255,0,0.2);
            border: 1px solid lime; border-radius: 5px; display: none; font-size: 12px;
        }

        #breaking-progress {
            position: absolute; top: 60%; left: 50%; transform: translateX(-50%);
            width: 100px; height: 10px; border: 2px solid white; display: none;
        }
        #breaking-bar { width: 0%; height: 100%; background: #ffff00; }

        #crafting-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #333; border: 4px solid #000; padding: 20px; pointer-events: all;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .crafting-grid { display: grid; gap: 5px; }
        .grid-2x2 { grid-template-columns: repeat(2, 55px); }
        .grid-3x3 { grid-template-columns: repeat(3, 55px); }
        .craft-slot { width: 55px; height: 55px; background: #111; border: 2px solid #555; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .craft-result { width: 65px; height: 65px; background: #222; border: 3px solid #fff; margin-left: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <!-- Main Menu -->
        <div id="menu-screen" class="screen">
            <h1>MINECRAFT SURVIVAL</h1>
            <p>Luis Edition - LocalStorage</p>
            <button id="btn-start" style="padding: 15px 30px; font-size: 1.2rem; cursor: pointer;">JOGAR</button>
        </div>

        <!-- World Selector -->
        <div id="world-screen" class="screen hidden">
            <h2>Selecione o Mundo</h2>
            <div class="world-list">
                <div class="world-item" onclick="selectWorld(1)">Mundo 1 <span id="w1-status" style="font-size: 10px; color: #888;"></span></div>
                <div class="world-item" onclick="selectWorld(2)">Mundo 2 <span id="w2-status" style="font-size: 10px; color: #888;"></span></div>
                <div class="world-item" onclick="selectWorld(3)">Mundo 3 <span id="w3-status" style="font-size: 10px; color: #888;"></span></div>
            </div>
            <button onclick="backToMenu()" style="margin-top: 20px; background: none; border: none; color: white; cursor: pointer; text-decoration: underline;">Voltar</button>
        </div>

        <div id="crafting-screen" class="hidden">
            <h2 id="craft-title">Criação</h2>
            <div style="display: flex; align-items: center;">
                <div id="grid-container" class="crafting-grid"></div>
                <div style="margin: 0 15px; font-size: 24px;">➡</div>
                <div id="result-slot" class="craft-result"></div>
            </div>
            <p style="font-size: 12px; color: #aaa;">Pressione 'E' para fechar</p>
        </div>

        <div id="game-hud" class="hidden">
            <div id="crosshair">+</div>
            <div id="stats"></div>
            <div id="save-indicator">Mundo Salvo!</div>
            <div id="breaking-progress"><div id="breaking-bar"></div></div>
            <div id="inventory-bar"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÕES ---
        const CHUNK_SIZE = 16;
        const RENDER_DISTANCE = 2;
        const STACK_LIMIT = 64;
        const WATER_LEVEL = 8;
        const PLAYER_HEIGHT = 1.62;
        let currentWorldId = 1;
        
        const BLOCK_DATA = {
            grass: { name: "Grama", hardness: 0.5, color: '#5d9944' },
            dirt: { name: "Terra", hardness: 0.5, color: '#79553a' },
            stone: { name: "Pedra", hardness: 2.0, color: '#888888' },
            wood: { name: "Madeira", hardness: 1.0, color: '#6b4b3a' },
            planks: { name: "Tábuas", hardness: 0.8, color: '#a27a4e' },
            leaf: { name: "Folha", hardness: 0.1, color: '#337733', opacity: 0.8 },
            sand: { name: "Areia", hardness: 0.4, color: '#ddd1a3' },
            cactus: { name: "Cacto", hardness: 0.3, color: '#2d4d22' },
            crafting_table: { name: "Bancada", hardness: 1.0, color: '#a27a4e' },
            stick: { name: "Graveto", isItem: true },
            axe: { name: "Machado", isItem: true, power: 3.0 }
        };

        const RECIPES = [
            { input: [['wood']], output: 'planks', count: 4, size: 2 },
            { input: [['planks'], ['planks']], output: 'stick', count: 4, size: 2 },
            { input: [['planks', 'planks'], ['planks', 'planks']], output: 'crafting_table', count: 1, size: 2 },
            { input: [['planks', 'planks', ''], ['planks', 'stick', ''], ['', 'stick', '']], output: 'axe', count: 1, size: 3 }
        ];

        // --- MOTOR DE JOGO ---
        let scene, camera, renderer, clock;
        let health = 10;
        let inventory = Array(9).fill(null);
        let selectedSlot = 0;
        let isInventoryOpen = false;
        let isUsingWorkBench = false;
        
        let blocks = new Map();
        let chunks = new Map();
        let currentBreaking = { key: null, startTime: 0, duration: 0 };
        
        let velocityY = 0;
        let lastY = 0;
        let isGrounded = false;
        let lookEuler = new THREE.Euler(0, 0, 0, 'YXZ');
        let keys = {};
        let waterPlane;
        const downRaycaster = new THREE.Raycaster();

        // --- PERSISTÊNCIA ---
        function getSaveKey() { return `minecraft_luis_save_world_${currentWorldId}`; }

        function saveWorld() {
            const worldData = {};
            blocks.forEach((mesh, key) => { worldData[key] = mesh.userData.type; });
            const saveData = {
                player: { pos: camera.position, rot: { x: lookEuler.x, y: lookEuler.y }, health: health },
                inventory: inventory,
                world: worldData
            };
            localStorage.setItem(getSaveKey(), JSON.stringify(saveData));
            showSaveIndicator();
        }

        function loadWorld() {
            const data = localStorage.getItem(getSaveKey());
            return data ? JSON.parse(data) : null;
        }

        function showSaveIndicator() {
            const el = document.getElementById('save-indicator');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        // --- INICIALIZAÇÃO ---
        function initGame(savedData) {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 20, 70);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(20, 50, 20);
            scene.add(sun);

            const waterGeo = new THREE.PlaneGeometry(2000, 2000);
            const waterMat = new THREE.MeshStandardMaterial({ color: 0x3366ff, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
            waterPlane = new THREE.Mesh(waterGeo, waterMat);
            waterPlane.rotation.x = -Math.PI / 2;
            waterPlane.position.y = WATER_LEVEL + 0.45;
            scene.add(waterPlane);

            clock = new THREE.Clock();

            if (savedData) {
                camera.position.set(savedData.player.pos.x, savedData.player.pos.y, savedData.player.pos.z);
                lookEuler.x = savedData.player.rot.x;
                lookEuler.y = savedData.player.rot.y;
                health = savedData.player.health;
                inventory = savedData.inventory;
                for (let key in savedData.world) {
                    const [x, y, z] = key.split(',').map(Number);
                    addBlock(x, y, z, savedData.world[key]);
                }
            } else {
                camera.position.set(0, 20, 0);
                inventory[0] = {type: 'wood', count: 16};
            }

            updateHUD();
            setInterval(saveWorld, 15000);
        }

        // --- GERAÇÃO PROCEDURAL COM ÁRVORES ---
        function createTree(x, y, z) {
            // Tronco
            for(let i=1; i<=4; i++) addBlock(x, y+i, z, 'wood');
            // Copa
            for(let lx=-2; lx<=2; lx++) {
                for(let lz=-2; lz<=2; lz++) {
                    for(let ly=0; ly<=1; ly++) {
                        if(Math.abs(lx) + Math.abs(lz) < 3) addBlock(x+lx, y+4+ly, z+lz, 'leaf');
                    }
                }
            }
            addBlock(x, y+6, z, 'leaf');
            addBlock(x+1, y+6, z, 'leaf');
            addBlock(x-1, y+6, z, 'leaf');
            addBlock(x, y+6, z+1, 'leaf');
            addBlock(x, y+6, z-1, 'leaf');
        }

        function generateChunk(cx, cz) {
            const chunkKey = `${cx},${cz}`;
            if (chunks.has(chunkKey)) return;
            chunks.set(chunkKey, true);

            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wx = cx * CHUNK_SIZE + x;
                    const wz = cz * CHUNK_SIZE + z;
                    
                    const groundHeight = Math.floor((Math.sin(wx * 0.08) * Math.cos(wz * 0.08) * 4) + 10);
                    const isDesert = (Math.sin(wx * 0.05) + Math.cos(wz * 0.05)) > 0.8;

                    for (let y = 0; y <= groundHeight; y++) {
                        const key = `${wx},${y},${wz}`;
                        if (!blocks.has(key)) {
                            let type = 'stone';
                            if (y === groundHeight) {
                                if (isDesert || y <= WATER_LEVEL + 1) type = 'sand';
                                else {
                                    type = 'grass';
                                    // Chance de árvore
                                    if(Math.random() < 0.02 && y > WATER_LEVEL + 2) {
                                        createTree(wx, y, wz);
                                    }
                                }
                            } else if (y > groundHeight - 3) {
                                type = isDesert ? 'sand' : 'dirt';
                            }
                            addBlock(wx, y, wz, type);
                        }
                    }
                }
            }
        }

        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const texCache = {};

        function getMaterial(type) {
            if (texCache[type]) return texCache[type];
            const data = BLOCK_DATA[type];
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = data.color;
            ctx.fillRect(0,0,16,16);
            ctx.fillStyle = "rgba(0,0,0,0.1)";
            for(let i=0; i<20; i++) ctx.fillRect(Math.random()*16, Math.random()*16, 1, 1);
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            const mat = new THREE.MeshStandardMaterial({ map: tex, transparent: !!data.opacity, opacity: data.opacity || 1 });
            texCache[type] = mat;
            return mat;
        }

        function addBlock(x, y, z, type) {
            const key = `${x},${y},${z}`;
            if (blocks.has(key)) return;
            const mesh = new THREE.Mesh(boxGeo, getMaterial(type));
            mesh.position.set(x, y, z);
            mesh.userData = { type };
            scene.add(mesh);
            blocks.set(key, mesh);
        }

        function removeBlock(x, y, z) {
            const key = `${Math.round(x)},${Math.round(y)},${Math.round(z)}`;
            const mesh = blocks.get(key);
            if (mesh) {
                scene.remove(mesh);
                blocks.delete(key);
                return mesh.userData.type;
            }
            return null;
        }

        function updateHUD() {
            const stats = document.getElementById('stats');
            stats.innerHTML = '';
            for(let i=0; i<10; i++) {
                const h = document.createElement('div');
                h.className = `heart ${i >= health ? 'empty' : ''}`;
                stats.appendChild(h);
            }
            const invBar = document.getElementById('inventory-bar');
            invBar.innerHTML = '';
            for(let i=0; i<9; i++) {
                const item = inventory[i];
                const s = document.createElement('div');
                s.className = `slot ${i === selectedSlot ? 'selected' : ''}`;
                if (item && item.count > 0) {
                    s.innerHTML = `<span>${BLOCK_DATA[item.type].name}</span><span class="count">${item.count}</span>`;
                }
                invBar.appendChild(s);
            }
        }

        function addToInventory(type, amt) {
            if (!type) return;
            for (let item of inventory) {
                if (item && item.type === type && item.count < STACK_LIMIT) {
                    const canAdd = Math.min(amt, STACK_LIMIT - item.count);
                    item.count += canAdd;
                    amt -= canAdd;
                    if (amt <= 0) { updateHUD(); return; }
                }
            }
            while (amt > 0) {
                const emptyIdx = inventory.findIndex(i => !i || i.count === 0);
                if (emptyIdx === -1) break;
                const toAdd = Math.min(amt, STACK_LIMIT);
                inventory[emptyIdx] = { type, count: toAdd };
                amt -= toAdd;
            }
            updateHUD();
        }

        function updatePhysics() {
            if(isInventoryOpen) return;
            const speed = keys['ShiftLeft'] ? 0.22 : 0.13;
            const move = new THREE.Vector3();
            if (keys['KeyW']) move.z -= 1;
            if (keys['KeyS']) move.z += 1;
            if (keys['KeyA']) move.x -= 1;
            if (keys['KeyD']) move.x += 1;
            move.applyEuler(new THREE.Euler(0, lookEuler.y, 0)).normalize().multiplyScalar(speed);

            const p = camera.position;
            const radius = 0.3;
            if (!isSolidBlockAt(p.x + move.x + Math.sign(move.x)*radius, p.y - 1.5, p.z)) p.x += move.x;
            if (!isSolidBlockAt(p.x, p.y - 1.5, p.z + move.z + Math.sign(move.z)*radius)) p.z += move.z;

            const inWater = p.y < WATER_LEVEL + 1.5;
            velocityY -= (inWater ? 0.005 : 0.015);
            velocityY = Math.max(velocityY, inWater ? -0.1 : -0.6); 
            p.y += velocityY;

            isGrounded = false;
            downRaycaster.set(p, new THREE.Vector3(0, -1, 0));
            const intersects = downRaycaster.intersectObjects(Array.from(blocks.values()));
            if (intersects.length > 0) {
                const dist = intersects[0].distance;
                if (dist <= PLAYER_HEIGHT + Math.max(0, -velocityY)) {
                    if (velocityY <= 0) {
                        p.y = intersects[0].point.y + PLAYER_HEIGHT;
                        velocityY = 0; 
                        isGrounded = true;
                    }
                }
            }
            camera.quaternion.setFromEuler(lookEuler);
            const cx = Math.floor(p.x / CHUNK_SIZE);
            const cz = Math.floor(p.z / CHUNK_SIZE);
            for(let dx=-RENDER_DISTANCE; dx<=RENDER_DISTANCE; dx++) {
                for(let dz=-RENDER_DISTANCE; dz<=RENDER_DISTANCE; dz++) generateChunk(cx + dx, cz + dz);
            }
        }

        function isSolidBlockAt(x, y, z) {
            return blocks.has(`${Math.round(x)},${Math.round(y)},${Math.round(z)}`);
        }

        let mouseBtn = -1;
        function handleInteractions() {
            if(isInventoryOpen || mouseBtn === -1) {
                document.getElementById('breaking-progress').style.display = 'none';
                currentBreaking.key = null;
                return;
            }
            const ray = new THREE.Raycaster();
            ray.setFromCamera({x:0, y:0}, camera);
            const intersects = ray.intersectObjects(Array.from(blocks.values()));
            if(intersects.length > 0 && intersects[0].distance < 5) {
                const hit = intersects[0];
                const pos = hit.object.position;
                const key = `${pos.x},${pos.y},${pos.z}`;
                if(mouseBtn === 0) {
                    if(currentBreaking.key !== key) {
                        currentBreaking = { key, startTime: Date.now(), duration: BLOCK_DATA[hit.object.userData.type].hardness * 1000 };
                    }
                    const elapsed = Date.now() - currentBreaking.startTime;
                    const pct = (elapsed / currentBreaking.duration) * 100;
                    document.getElementById('breaking-progress').style.display = 'block';
                    document.getElementById('breaking-bar').style.width = pct + '%';
                    if(pct >= 100) {
                        const type = removeBlock(pos.x, pos.y, pos.z);
                        addToInventory(type, 1);
                        currentBreaking.key = null;
                        document.getElementById('breaking-progress').style.display = 'none';
                    }
                }
            } else document.getElementById('breaking-progress').style.display = 'none';
        }

        // --- MENU LOGIC ---
        function backToMenu() {
            document.getElementById('world-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        function selectWorld(id) {
            currentWorldId = id;
            const savedData = loadWorld();
            document.getElementById('world-screen').classList.add('hidden');
            document.getElementById('game-hud').classList.remove('hidden');
            initGame(savedData);
            renderer.domElement.requestPointerLock();
            animate();
        }

        function refreshWorldStats() {
            for(let i=1; i<=3; i++) {
                const data = localStorage.getItem(`minecraft_luis_save_world_${i}`);
                document.getElementById(`w${i}-status`).innerText = data ? "(Salvo)" : "(Vazio)";
            }
        }

        document.getElementById('btn-start').onclick = () => {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('world-screen').classList.remove('hidden');
            refreshWorldStats();
        };

        // --- UI & EVENTS ---
        function openCrafting(workbench = false) {
            isInventoryOpen = true;
            isUsingWorkBench = workbench;
            document.exitPointerLock();
            document.getElementById('crafting-screen').classList.remove('hidden');
        }

        function closeInventory() {
            isInventoryOpen = false;
            document.getElementById('crafting-screen').classList.add('hidden');
            renderer.domElement.requestPointerLock();
        }

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'KeyE') isInventoryOpen ? closeInventory() : openCrafting(false);
            if(e.code === 'KeyP') saveWorld(); 
            if(e.code === 'Space' && isGrounded) velocityY = 0.22;
            if(e.code.startsWith('Digit')) selectedSlot = parseInt(e.code.slice(-1)) - 1;
            updateHUD();
        });
        document.addEventListener('keyup', e => keys[e.code] = false);
        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement) {
                lookEuler.y -= e.movementX * 0.002;
                lookEuler.x -= e.movementY * 0.002;
                lookEuler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, lookEuler.x));
            }
        });
        document.addEventListener('mousedown', e => {
            if(!isInventoryOpen) {
                mouseBtn = e.button;
                if(e.button === 2) {
                    const ray = new THREE.Raycaster();
                    ray.setFromCamera({x:0, y:0}, camera);
                    const intersects = ray.intersectObjects(Array.from(blocks.values()));
                    if(intersects.length > 0 && intersects[0].distance < 5) {
                        const hit = intersects[0];
                        if(hit.object.userData.type === 'crafting_table') openCrafting(true);
                        else {
                            const item = inventory[selectedSlot];
                            if(item && item.count > 0 && !BLOCK_DATA[item.type].isItem) {
                                const n = hit.face.normal;
                                const p = hit.object.position;
                                addBlock(Math.round(p.x+n.x), Math.round(p.y+n.y), Math.round(p.z+n.z), item.type);
                                item.count--;
                                if(item.count <= 0) inventory[selectedSlot] = null;
                                updateHUD();
                            }
                        }
                    }
                }
            }
        });
        document.addEventListener('mouseup', () => mouseBtn = -1);

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            handleInteractions();
            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
